<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Curriculum</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Generador de Curriculum</h1>

    <form onsubmit="event.preventDefault(); generarPDF();">
        <input type="text" id="nombre" placeholder="Nombre completo" required>
        <input type="text" id="profesion" placeholder="Profesión" required>
        <input type="email" id="correo" placeholder="Correo electrónico" required>
        <input type="text" id="telefono" placeholder="Teléfono" required>
        <textarea id="perfil" placeholder="Perfil profesional"></textarea>
        <textarea id="experiencia" placeholder="Experiencia laboral"></textarea>
        <textarea id="educacion" placeholder="Educación"></textarea>

        <button type="submit">Generar y Descargar PDF</button>
    </form>
</div>

<!-- Librería jsPDF (más estable en móvil) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="script.js"></script>

</body>
</html>

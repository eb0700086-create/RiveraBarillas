<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Curriculum</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Generador de Curriculum</h1>

    <form onsubmit="event.preventDefault(); generarPDF();">
        <input type="text" id="nombre" placeholder="Nombre completo" required>
        <input type="text" id="profesion" placeholder="Profesión" required>
        <input type="email" id="correo" placeholder="Correo electrónico" required>
        <input type="text" id="telefono" placeholder="Teléfono" required>
        <textarea id="perfil" placeholder="Perfil profesional"></textarea>
        <textarea id="experiencia" placeholder="Experiencia laboral"></textarea>
        <textarea id="educacion" placeholder="Educación"></textarea>

        <button type="submit">Generar y Descargar PDF</button>
    </form>
</div>

<!-- Contenedor oculto estable para generar el PDF -->
<div id="areaPDF" style="position: fixed; top: -9999px; left: -9999px; width: 800px;"></div>

<!-- Librería html2pdf -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<!-- Tu script -->
<script src="script.js"></script>

</body>
</html>
